name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  review:
    # Skip on fork PRs: the review needs CLAUDE_CODE_OAUTH_TOKEN, which isn't
    # available to pull_request runs from forks, so it only fails.
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required to post reviews
      issues: read
      id-token: write # Required in order for the Claude GitHub app to function
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@b76a0776ae74036e77cd11018083743453d7ad35 # v1.0.179
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Temporarily uncomment to verify changes to the workflow before
          # merging and without tripping `workflow-must-match-default-branch`
          # validation. Bypasses app-token exchange and posts at GitHub bot.
          #github_token: ${{ secrets.GITHUB_TOKEN }}
          # Allow PRs opened by Bob (flox-forge-agent) to be reviewed; the
          # action rejects bot actors by default.
          allowed_bots: 'flox-forge-agent'
          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read
          plugin_marketplaces: https://github.com/anthropics/claude-plugins-official.git
          claude_args: |
            --model opus
            --effort xhigh
            --dangerously-skip-permissions
            # Trigger MCP installations. No actual effect on permissions since
            # we're allowing all.
            --allowedTools "mcp__github_inline_comment__*,mcp__github_comment__*"
          plugins: 'superpowers@claude-plugins-official'
          track_progress: true
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Conduct the review using the superpowers:requesting-code-review skill
            and its code-reviewer template, reviewing the PR's full diff against
            its base.

            Fetch whatever git history you need using `gh pr diff`, `gh pr
            view`, or `git fetch`. The current checkout is shallow.

            Reporting requirements:
            - Post each issue as an inline comment on the relevant line using
              the mcp__github_inline_comment__create_inline_comment tool, so
              findings are threaded and individually addressable.
            - Finish by writing the review summary into the tracking comment.
              If there are no issues, say specifically what you reviewed and
              verified rather than a bare "no issues found".
