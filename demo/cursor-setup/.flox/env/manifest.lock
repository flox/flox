{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.13.0",
    "vars": {
      "FLOX_FEATURES_AUTO_ACTIVATE": "true",
      "FLOX_FEATURES_SANDBOX_ACTIVATE": "true",
      "GITHUB_TOKEN": "ghp-demo-FAKE"
    },
    "hook": {
      "on-activate": "  # Cursor is a local policy layer — there is no daemon to run as a service. The\n  # setup concern is the alignment prerequisites, surfaced here so the operator\n  # learns of them before the first 'cd', not mid-demo.\n\n  # 1. CLI: the `cursor` backend needs Cursor's agent CLI ('agent') to run the\n  #    agent under the compiled policy. Presence-detected, not installed here.\n  if ! command -v agent >/dev/null 2>&1; then\n    echo \"note: Cursor's 'agent' CLI is not on PATH. Install it with\" >&2\n    echo \"      'curl https://cursor.com/install -fsS | bash' (see demo/CURSOR.md\" >&2\n    echo \"      beat 0). flox generates the permission config regardless; the\" >&2\n    echo \"      launch boundary names the CLI wall.\" >&2\n  fi\n\n  # 2. Auth: the agent needs a Cursor account. flox probes CURSOR_API_KEY\n  #    non-interactively (never a browser login). Note its absence so the\n  #    operator knows the launch boundary will name the auth wall.\n  if [ -z \"${CURSOR_API_KEY:-}\" ]; then\n    echo \"note: CURSOR_API_KEY is unset. That is fine for config generation —\" >&2\n    echo \"      flox writes <project>/.cursor/cli.json anyway; running the agent\" >&2\n    echo \"      itself needs a Cursor account (see demo/CURSOR.md beat 0).\" >&2\n  fi\n\n  # Demo fixture: a planted \"secret\" that must stay unreadable to the agent (beat\n  # 2 of demo/CURSOR.md). Cursor is LOCAL, so unlike the cloud backends the host\n  # filesystem IS reachable — the protection is the compiled Read/Write deny on\n  # .env files, not remoteness. Removed by profile.deactivate.\n  mkdir -p \"$HOME/demo-secrets\"\n  printf 'API_KEY=sk-demo-FAKE-do-not-use\\n' > \"$HOME/demo-secrets/.env\"\n"
    },
    "profile": {
      "bash": "  if [ -n \"${FLOX_BIN:-}\" ]; then\n    alias flox='$FLOX_BIN'\n  fi\n  export FLOX_VERSION=\"$(\"${FLOX_BIN:-flox}\" --version)\"\n",
      "zsh": "  if [ -n \"${FLOX_BIN:-}\" ]; then\n    alias flox='$FLOX_BIN'\n  fi\n  export FLOX_VERSION=\"$(\"${FLOX_BIN:-flox}\" --version)\"\n",
      "deactivate": {
        "common": "  # Deactivating the demo cleans up after itself: remove the planted secret.\n  rm -rf \"$HOME/demo-secrets\"\n"
      }
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "x86_64-linux"
      ]
    }
  },
  "packages": []
}
