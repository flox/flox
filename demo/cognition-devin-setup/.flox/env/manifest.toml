schema-version = "1.13.0"

# Cognition's Devin is a subscription agent runtime reached over its API, so
# this setup env runs no local service and needs no provider daemon. The
# `cognition-devin` backend generates a git-backed blueprint hand-off
# (.devin/blueprint.yaml) from the baked image; the only genuinely required
# host tool is Docker (to bake the reproducible substrate image), installed
# separately. The Devin CLI is presence-detected, not required — so this env
# installs no provider CLI. No public `devin` CLI is available in the catalog
# on this host; if one ships later, add it to [install].

[vars]
# Feature flags the demo needs in the presentation shell.
FLOX_FEATURES_SANDBOX_ACTIVATE = "true"
FLOX_FEATURES_AUTO_ACTIVATE = "true"
# Planted for the token-isolation beat: visible on the host. On the Devin
# backend the runtime is remote and shares no host env, so this simply never
# reaches the session.
GITHUB_TOKEN = "ghp-demo-FAKE"

[hook]
on-activate = '''
  # Devin is a subscription/cloud runtime — there is no local gateway to run as
  # a service. The setup concern is the hand-off prerequisites, surfaced here so
  # the operator learns of them before the first 'cd', not mid-demo.

  # 1. Docker: the cognition-devin backend bakes the reproducible substrate
  #    image locally before Devin's build can pull it. Docker is the one
  #    required host tool.
  if ! command -v docker >/dev/null 2>&1; then
    echo "note: 'docker' not found on PATH — the cognition-devin backend needs" >&2
    echo "      it to bake the substrate image (see demo/DEVIN.md beat 0)." >&2
  fi

  # 2. CLI: the Devin CLI is presence-detected, not required. The blueprint
  #    hand-off is generated regardless; note its absence so the operator knows
  #    the launch boundary will name the subscription/partnership wall.
  if ! command -v devin >/dev/null 2>&1; then
    echo "note: no 'devin' CLI on PATH. That is fine for the local beats —" >&2
    echo "      flox generates the .devin/blueprint.yaml hand-off anyway; the" >&2
    echo "      snapshot build itself needs a Devin subscription and a" >&2
    echo "      partnership (see demo/DEVIN.md)." >&2
  fi

  # 3. Registry: Devin's build pulls the substrate image the blueprint
  #    references, so the generated blueprint's image ref needs a registry
  #    prefix. Default to a bare tag and let the operator override.
  if [ -z "${FLOX_SANDBOX_COGNITION_DEVIN_REGISTRY:-}" ]; then
    echo "note: FLOX_SANDBOX_COGNITION_DEVIN_REGISTRY is unset; the blueprint" >&2
    echo "      will use a bare image tag. Export it (e.g. docker.io/<user>)" >&2
    echo "      before the snapshot build." >&2
  fi

  # Demo fixture: a planted "secret" the runtime must never see (beat 4 of
  # demo/DEVIN.md). On Devin the runtime is remote and has no view of the host
  # filesystem at all, so this is unreachable by construction. Removed by
  # profile.deactivate.
  mkdir -p "$HOME/demo-secrets"
  printf 'API_KEY=sk-demo-FAKE-do-not-use\n' > "$HOME/demo-secrets/.env"
'''

# Presentation-shell setup, so the walkthrough's manual export block
# disappears. bash and zsh only — the demo script targets bash, and
# `alias`/`export` syntax is not portable to fish/tcsh.
[profile]
bash = '''
  if [ -n "${FLOX_BIN:-}" ]; then
    alias flox='$FLOX_BIN'
  fi
  export FLOX_VERSION="$("${FLOX_BIN:-flox}" --version)"
'''
zsh = '''
  if [ -n "${FLOX_BIN:-}" ]; then
    alias flox='$FLOX_BIN'
  fi
  export FLOX_VERSION="$("${FLOX_BIN:-flox}" --version)"
'''

[profile.deactivate]
common = '''
  # Deactivating the demo cleans up after itself: remove the planted secret.
  rm -rf "$HOME/demo-secrets"
'''

[options]
# Devin is reached over its API from any host; the setup env installs no
# provider CLI, so both dev systems are supported.
systems = ["aarch64-darwin", "x86_64-linux"]
