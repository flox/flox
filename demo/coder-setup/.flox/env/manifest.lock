{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.13.0",
    "install": {
      "coder": {
        "pkg-path": "coder",
        "version": "^2.33"
      }
    },
    "vars": {
      "CODER_ACCESS_URL": "http://127.0.0.1:3000",
      "CODER_FIRST_USER_EMAIL": "demo@flox.dev",
      "CODER_FIRST_USER_FULL_NAME": "Flox Demo",
      "CODER_FIRST_USER_PASSWORD": "flox-demo-SqueamishOssifrage-1",
      "CODER_FIRST_USER_TRIAL": "false",
      "CODER_FIRST_USER_USERNAME": "flox",
      "CODER_URL": "http://127.0.0.1:3000",
      "FLOX_FEATURES_AUTO_ACTIVATE": "true",
      "FLOX_FEATURES_SANDBOX_ACTIVATE": "true",
      "GITHUB_TOKEN": "ghp-demo-FAKE"
    },
    "hook": {
      "on-activate": "  # The built-in PostgreSQL and server state live in the env cache so\n  # the deployment is self-contained and disposable with the env.\n  export CODER_CONFIG_DIR=\"$FLOX_ENV_CACHE/coder/config\"\n  export CODER_CACHE_DIRECTORY=\"$FLOX_ENV_CACHE/coder/cache\"\n  mkdir -p \"$CODER_CONFIG_DIR\" \"$CODER_CACHE_DIRECTORY\"\n\n  # Demo fixture: a planted \"secret\" the guest must never see\n  # (beat 2 of demo/CODER.md). Removed by profile.deactivate.\n  mkdir -p \"$HOME/demo-secrets\"\n  printf 'API_KEY=sk-demo-FAKE-do-not-use\\n' > \"$HOME/demo-secrets/.env\"\n"
    },
    "profile": {
      "bash": "  if [ -n \"${FLOX_BIN:-}\" ]; then\n    alias flox='$FLOX_BIN'\n  fi\n  export FLOX_VERSION=\"$(\"${FLOX_BIN:-flox}\" --version)\"\n",
      "zsh": "  if [ -n \"${FLOX_BIN:-}\" ]; then\n    alias flox='$FLOX_BIN'\n  fi\n  export FLOX_VERSION=\"$(\"${FLOX_BIN:-flox}\" --version)\"\n",
      "deactivate": {
        "common": "  # Deactivating the demo cleans up after itself: remove the planted\n  # secret. The server + built-in DB stop with the activation (they are\n  # flox services); their state under $FLOX_ENV_CACHE/coder persists\n  # across sessions — demo/cleanup.sh removes it.\n  rm -rf \"$HOME/demo-secrets\"\n"
      }
    },
    "options": {
      "systems": [
        "aarch64-darwin"
      ]
    },
    "services": {
      "auto-start": true,
      "login": {
        "command": "  for _ in $(seq 60); do\n    if coder login \"$CODER_URL\" \\\n         --first-user-email \"$CODER_FIRST_USER_EMAIL\" \\\n         --first-user-username \"$CODER_FIRST_USER_USERNAME\" \\\n         --first-user-password \"$CODER_FIRST_USER_PASSWORD\" \\\n         --first-user-full-name \"$CODER_FIRST_USER_FULL_NAME\" \\\n         --first-user-trial=\"$CODER_FIRST_USER_TRIAL\" 2>/dev/null; then\n      echo \"logged in to Coder at $CODER_URL as $CODER_FIRST_USER_USERNAME\"\n      if coder whoami >/dev/null 2>&1; then\n        echo \"server reachable\"\n        exit 0\n      fi\n    fi\n    sleep 2\n  done\n  echo \"coder server did not become reachable on 127.0.0.1:3000\" >&2\n  exit 1\n"
      },
      "server": {
        "command": "  if lsof -nP -iTCP:3000 -sTCP:LISTEN >/dev/null 2>&1; then\n    echo \"ERROR: something else already listens on 127.0.0.1:3000:\" >&2\n    lsof -nP -iTCP:3000 -sTCP:LISTEN >&2\n    echo \"Likely a leftover coder server from a previous run. Stop it.\" >&2\n    exit 1\n  fi\n  exec coder server --access-url \"$CODER_ACCESS_URL\" --http-address 127.0.0.1:3000\n"
      }
    }
  },
  "packages": [
    {
      "attr_path": "coder",
      "broken": false,
      "derivation": "/nix/store/jarl36s8xay7781rfcqhdll3fxg1nxrk-coder-2.33.11.drv",
      "description": "Provision remote development environments via Terraform",
      "install_id": "coder",
      "license": "AGPL-3.0-only",
      "locked_url": "https://github.com/flox/nixpkgs?rev=753cc8a3a87467296ddd1fa93f0cc3e81120ee46",
      "name": "coder-2.33.11",
      "pname": "coder",
      "rev": "753cc8a3a87467296ddd1fa93f0cc3e81120ee46",
      "rev_count": 1035164,
      "rev_date": "2026-07-15T13:07:34Z",
      "scrape_date": "2026-07-17T04:52:32.676287Z",
      "stabilities": [
        "staging",
        "unstable"
      ],
      "unfree": false,
      "version": "2.33.11",
      "outputs_to_install": [
        "out"
      ],
      "outputs": {
        "out": "/nix/store/70al61i13m9pwq2f1wzna0wf2dqfg11v-coder-2.33.11"
      },
      "system": "aarch64-darwin",
      "group": "toplevel",
      "priority": 5
    }
  ]
}
