{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.13.0",
    "install": {
      "daytona-bin": {
        "pkg-path": "daytona-bin"
      }
    },
    "vars": {
      "FLOX_FEATURES_AUTO_ACTIVATE": "true",
      "FLOX_FEATURES_SANDBOX_ACTIVATE": "true",
      "GITHUB_TOKEN": "ghp-demo-FAKE"
    },
    "hook": {
      "on-activate": "  # Daytona is cloud-remote — there is no local gateway to run as a service. The\n  # setup concern is the launch prerequisites, surfaced here so the operator\n  # learns of them before the first 'cd', not mid-demo.\n\n  # 1. Docker: the daytona backend bakes the environment image locally before\n  #    Daytona registers it as a snapshot. Docker is one of the two required\n  #    host tools.\n  if ! command -v docker >/dev/null 2>&1; then\n    echo \"note: 'docker' not found on PATH — the daytona backend needs it to bake\" >&2\n    echo \"      the image before Daytona registers the snapshot (see demo/DAYTONA.md beat 0).\" >&2\n  fi\n\n  # 2. CLI: the daytona CLI registers the snapshot from the baked image and\n  #    drives the launch. It is installed by this env (daytona-bin). Verify it\n  #    resolved, then probe auth non-interactively.\n  if ! command -v daytona >/dev/null 2>&1; then\n    echo \"note: 'daytona' CLI not found on PATH even though this env installs\" >&2\n    echo \"      daytona-bin — re-run 'flox activate' or check the lock.\" >&2\n  elif [ -z \"${DAYTONA_API_KEY:-}\" ] && ! daytona whoami >/dev/null 2>&1; then\n    # Non-interactive auth probe: never open a browser. `daytona whoami` reports\n    # the signed-in state; env-key presence is the SDK/REST fallback signal.\n    echo \"note: the Daytona CLI is present but not authenticated.\" >&2\n    echo \"      Run 'daytona login' before the launch beats (see demo/DAYTONA.md\" >&2\n    echo \"      beat 0), or export DAYTONA_API_KEY=<key> from the dashboard.\" >&2\n  fi\n\n  # 3. Registry: Daytona registers the snapshot by pulling the image the\n  #    launcher's Image.base references, so the generated launcher needs a\n  #    registry prefix. Default to a bare tag and let the operator override;\n  #    flox reads FLOX_SANDBOX_DAYTONA_REGISTRY when it renders the launcher.\n  if [ -z \"${FLOX_SANDBOX_DAYTONA_REGISTRY:-}\" ]; then\n    echo \"note: FLOX_SANDBOX_DAYTONA_REGISTRY is unset; the generated launcher will\" >&2\n    echo \"      use a bare image tag. Export it (e.g. docker.io/<user>) before the\" >&2\n    echo \"      snapshot registration.\" >&2\n  fi\n\n  # Demo fixture: a planted \"secret\" the sandbox must never see (beat 4 of\n  # demo/DAYTONA.md). On Daytona the sandbox is remote and has no view of the\n  # host filesystem at all, so this is unreachable by construction. Removed by\n  # profile.deactivate.\n  mkdir -p \"$HOME/demo-secrets\"\n  printf 'API_KEY=sk-demo-FAKE-do-not-use\\n' > \"$HOME/demo-secrets/.env\"\n"
    },
    "profile": {
      "bash": "  if [ -n \"${FLOX_BIN:-}\" ]; then\n    alias flox='$FLOX_BIN'\n  fi\n  export FLOX_VERSION=\"$(\"${FLOX_BIN:-flox}\" --version)\"\n",
      "zsh": "  if [ -n \"${FLOX_BIN:-}\" ]; then\n    alias flox='$FLOX_BIN'\n  fi\n  export FLOX_VERSION=\"$(\"${FLOX_BIN:-flox}\" --version)\"\n",
      "deactivate": {
        "common": "  # Deactivating the demo cleans up after itself: remove the planted secret.\n  rm -rf \"$HOME/demo-secrets\"\n"
      }
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "x86_64-linux"
      ]
    }
  },
