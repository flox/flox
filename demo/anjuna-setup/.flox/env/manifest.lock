{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.13.0",
    "vars": {
      "FLOX_FEATURES_AUTO_ACTIVATE": "true",
      "FLOX_FEATURES_SANDBOX_ACTIVATE": "true",
      "GITHUB_TOKEN": "ghp-demo-FAKE"
    },
    "hook": {
      "on-activate": "  # Anjuna is a license-gated, hardware-TEE runtime — there is no local gateway\n  # to run as a service. The setup concern is the hand-off prerequisites,\n  # surfaced here so the operator learns of them before the first 'cd', not\n  # mid-demo.\n\n  # 1. Docker: the anjuna backend bakes the converter's input image locally\n  #    before Anjuna's build-enclave can consume it. Docker is the one required\n  #    host tool.\n  if ! command -v docker >/dev/null 2>&1; then\n    echo \"note: 'docker' not found on PATH — the anjuna backend needs it to\" >&2\n    echo \"      bake the converter's input image (see demo/ANJUNA.md beat 0).\" >&2\n  fi\n\n  # 2. CLI: the anjuna-nitro-cli is presence-detected, not required, and is\n  #    commercially licensed (not in the Flox catalog). The converter-config\n  #    hand-off is generated regardless; note its absence so the operator knows\n  #    the launch boundary will name the license + hardware walls.\n  if ! command -v anjuna-nitro-cli >/dev/null 2>&1; then\n    echo \"note: no 'anjuna-nitro-cli' on PATH. That is fine for the local beats\" >&2\n    echo \"      — flox generates the enclave-converter config anyway; the\" >&2\n    echo \"      enclave build itself needs an Anjuna license and TEE hardware\" >&2\n    echo \"      (see demo/ANJUNA.md).\" >&2\n  fi\n\n  # 3. Registry: Anjuna's build-enclave pulls the substrate image the config\n  #    references, so the generated --docker-uri needs a registry prefix.\n  #    Default to a bare tag and let the operator override.\n  if [ -z \"${FLOX_SANDBOX_ANJUNA_REGISTRY:-}\" ]; then\n    echo \"note: FLOX_SANDBOX_ANJUNA_REGISTRY is unset; the build invocation will\" >&2\n    echo \"      use a bare image tag. Export it (e.g. docker.io/<user>) before\" >&2\n    echo \"      the enclave build.\" >&2\n  fi\n\n  # Demo fixture: a planted \"secret\" the runtime must never see (beat 4 of\n  # demo/ANJUNA.md). On Anjuna the enclave is memory-encrypted against the host\n  # itself, so this is unreachable by construction. Removed by\n  # profile.deactivate.\n  mkdir -p \"$HOME/demo-secrets\"\n  printf 'API_KEY=sk-demo-FAKE-do-not-use\\n' > \"$HOME/demo-secrets/.env\"\n"
    },
    "profile": {
      "bash": "  if [ -n \"${FLOX_BIN:-}\" ]; then\n    alias flox='$FLOX_BIN'\n  fi\n  export FLOX_VERSION=\"$(\"${FLOX_BIN:-flox}\" --version)\"\n",
      "zsh": "  if [ -n \"${FLOX_BIN:-}\" ]; then\n    alias flox='$FLOX_BIN'\n  fi\n  export FLOX_VERSION=\"$(\"${FLOX_BIN:-flox}\" --version)\"\n",
      "deactivate": {
        "common": "  # Deactivating the demo cleans up after itself: remove the planted secret.\n  rm -rf \"$HOME/demo-secrets\"\n"
      }
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "x86_64-linux"
      ]
    }
  },
  "packages": []
}
