schema-version = "1.13.0"

[install]
openshell.pkg-path = "djsauble/openshell"

[vars]
# Feature flags the demo needs in the presentation shell.
FLOX_FEATURES_SANDBOX_ACTIVATE = "true"
FLOX_FEATURES_AUTO_ACTIVATE = "true"
# Planted for the token-isolation beat: visible on the host, absent
# in the guest.
GITHUB_TOKEN = "ghp-demo-FAKE"

[hook]
on-activate = '''
  # One-time TLS material for the local gateway, kept in the env cache.
  tls_dir="$FLOX_ENV_CACHE/openshell/tls"
  if [ ! -d "$tls_dir" ]; then
    mkdir -p "$tls_dir"
    openshell-gateway generate-certs \
      --output-dir "$tls_dir" \
      --server-san host.openshell.internal
  fi
  export OPENSHELL_LOCAL_TLS_DIR="$tls_dir"

  # Gateway config rendered into the env cache: the demo needs the
  # docker driver with bind mounts (flox live-mounts the project into
  # the sandbox at its real path).
  config="$FLOX_ENV_CACHE/openshell/gateway.toml"
  if [ ! -f "$config" ]; then
    mkdir -p "$(dirname "$config")"
    cat > "$config" <<'EOF'
[openshell.gateway]
compute_drivers = ["docker"]

[openshell.drivers.docker]
enable_bind_mounts = true
EOF
  fi
  export OPENSHELL_GATEWAY_CONFIG="$config"

  # Demo fixture: a planted "secret" the guest must never see
  # (beat 2 of demo/OPENSHELL.md). Removed by profile.deactivate.
  mkdir -p "$HOME/demo-secrets"
  printf 'API_KEY=sk-demo-FAKE-do-not-use\n' > "$HOME/demo-secrets/.env"
'''

# Presentation-shell setup, so the walkthrough's manual export block
# disappears. bash and zsh only — the demo script targets bash, and
# `alias`/`export` syntax is not portable to fish/tcsh.
[profile]
bash = '''
  if [ -n "${FLOX_BIN:-}" ]; then
    alias flox='$FLOX_BIN'
  fi
  export FLOX_VERSION="$("${FLOX_BIN:-flox}" --version)"
'''
zsh = '''
  if [ -n "${FLOX_BIN:-}" ]; then
    alias flox='$FLOX_BIN'
  fi
  export FLOX_VERSION="$("${FLOX_BIN:-flox}" --version)"
'''

[profile.deactivate]
common = '''
  # Deactivating the demo cleans up after itself: remove the planted
  # secret. Gateway registration persists across sessions by design —
  # demo/cleanup.sh removes it.
  rm -rf "$HOME/demo-secrets"
'''

[services]
auto-start = true

# The gateway is a plain foreground process (the brew formula wraps the
# same exec in launchd); as a flox service it lives exactly as long as
# the activation. The port preflight fails LOUDLY when something else
# owns 17670 (e.g. a leftover launchd gateway from a previous manual
# install) — without it the bind failure is silent and the CLI ends up
# talking to the stale gateway with mismatched TLS (BadSignature).
[services.gateway]
command = '''
  if lsof -nP -iTCP:17670 -sTCP:LISTEN >/dev/null 2>&1; then
    echo "ERROR: something else already listens on 127.0.0.1:17670:" >&2
    lsof -nP -iTCP:17670 -sTCP:LISTEN >&2
    echo "Likely a leftover gateway from a previous install. Stop it, e.g.:" >&2
    echo "  launchctl bootout gui/\$(id -u)/homebrew.mxcl.openshell" >&2
    echo "  rm ~/Library/LaunchAgents/homebrew.mxcl.openshell.plist" >&2
    exit 1
  fi
  exec openshell-gateway --config "$OPENSHELL_GATEWAY_CONFIG"
'''

# One-shot registration under a demo-scoped name. Re-registers when the
# stored CA differs from this environment's CA (stale registrations
# otherwise fail with BadSignature), and verifies reachability after
# adding. NOTE: writes ~/.config/openshell (see ../README.md).
[services.gateway-register]
command = '''
  reg="$HOME/.config/openshell/gateways/flox-demo"
  if [ -d "$reg" ] && cmp -s "$reg/mtls/ca.crt" "$OPENSHELL_LOCAL_TLS_DIR/ca.crt"; then
    echo "gateway 'flox-demo' already registered (CA matches)"
    exit 0
  fi
  if [ -d "$reg" ]; then
    echo "re-registering 'flox-demo': stored CA does not match this environment's"
    openshell gateway remove flox-demo 2>/dev/null || rm -rf "$reg"
  fi
  for _ in $(seq 60); do
    if openshell gateway add https://127.0.0.1:17670 --local --name flox-demo 2>/dev/null; then
      echo "registered gateway 'flox-demo'"
      if openshell status >/dev/null 2>&1; then
        echo "gateway reachable"
        exit 0
      fi
      echo "registered but unreachable — is a stale gateway holding port 17670? (lsof -nP -iTCP:17670)" >&2
      exit 1
    fi
    sleep 2
  done
  echo "gateway did not become reachable on 127.0.0.1:17670" >&2
  exit 1
'''

[options]
systems = ["aarch64-darwin"]
