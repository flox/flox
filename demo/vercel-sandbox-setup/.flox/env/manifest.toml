schema-version = "1.13.0"

# Vercel Sandbox is a cloud-API sandbox provider reached over its API, so this
# setup env runs no local service. Unlike every OCI backend, the vercel-sandbox
# backend does NOT bake an image: Vercel Sandbox boots a FIXED base runtime
# (node22/node24/python3.13) and cannot ingest a baked image. So flox generates
# a flox bootstrap (installs Flox in-sandbox and activates from FloxHub) plus a
# @vercel/sandbox launcher. The genuinely required host tool is the `vercel`
# CLI, which authenticates the SDK (OIDC token via `vercel env pull`). The
# `vercel` package is a Node CLI and is NOT in the flox catalog / nixpkgs, so
# this env installs `nodejs` to provide `npm` and the operator runs
# `npm install -g vercel`. Auth (vercel login / VERCEL_TOKEN) and a FloxHub push
# are the walls.

[install]
# nodejs provides npm so the operator can install the Vercel CLI:
#   npm install -g vercel
# The CLI itself is not packaged in the catalog; npm is the supported path.
nodejs.pkg-path = "nodejs"

[vars]
# Feature flags the demo needs in the presentation shell.
FLOX_FEATURES_SANDBOX_ACTIVATE = "true"
FLOX_FEATURES_AUTO_ACTIVATE = "true"
# Planted for the token-isolation beat: visible on the host. On the
# vercel-sandbox backend the sandbox is remote and shares no host env, so this
# simply never reaches the sandbox.
GITHUB_TOKEN = "ghp-demo-FAKE"

[hook]
on-activate = '''
  # Vercel Sandbox is cloud-remote — there is no local gateway to run as a
  # service. The setup concern is the launch prerequisites, surfaced here so the
  # operator learns of them before the first 'cd', not mid-demo.

  # 1. CLI: the vercel CLI authenticates the @vercel/sandbox SDK (it downloads
  #    the OIDC token with `vercel env pull`). It is a Node package (`vercel`),
  #    not in the catalog, so install it via npm (nodejs is installed by this
  #    env). Presence-detect and guide.
  if ! command -v vercel >/dev/null 2>&1; then
    echo "note: 'vercel' CLI not found on PATH. Install it with:" >&2
    echo "        npm install -g vercel" >&2
    echo "      (nodejs/npm are provided by this env; see demo/VERCEL-SANDBOX.md beat 0)." >&2
  elif ! vercel whoami >/dev/null 2>&1 && [ -z "${VERCEL_OIDC_TOKEN:-}" ] \
       && [ -z "${VERCEL_TOKEN:-}" ]; then
    # Non-interactive auth probe: never open a browser. `vercel whoami` reports
    # the signed-in scope; env-token presence is the SDK fallback signal.
    echo "note: the Vercel CLI is present but not authenticated." >&2
    echo "      Run 'vercel login' then 'vercel link' + 'vercel env pull' before" >&2
    echo "      the launch beats (see demo/VERCEL-SANDBOX.md beat 0), or export" >&2
    echo "      VERCEL_TOKEN with VERCEL_TEAM_ID/VERCEL_PROJECT_ID." >&2
  fi

  # 2. FloxHub push: the runtime is fixed and no image is pushed, so the
  #    generated bootstrap activates `flox activate -r <owner>/<env>`. The
  #    environment must be on FloxHub. flox reads FLOX_SANDBOX_VERCEL_FLOXHUB_REF
  #    when it renders the bootstrap; without it a <owner>/<env> placeholder is
  #    used and the launch-boundary message calls it out.
  if [ -z "${FLOX_SANDBOX_VERCEL_FLOXHUB_REF:-}" ]; then
    echo "note: FLOX_SANDBOX_VERCEL_FLOXHUB_REF is unset; the generated bootstrap" >&2
    echo "      will use a <owner>/<env> placeholder. Push the demo env" >&2
    echo "      ('flox push --owner <you>') and export the ref (e.g." >&2
    echo "      <you>/sandbox-demo) before the launch." >&2
  fi

  # 3. Runtime: Vercel Sandbox boots a FIXED base runtime; the default is
  #    node24. Note the override knob and the accepted set.
  if [ -n "${FLOX_SANDBOX_VERCEL_RUNTIME:-}" ]; then
    case "${FLOX_SANDBOX_VERCEL_RUNTIME}" in
      node22|node24|python3.13) ;;
      *)
        echo "note: FLOX_SANDBOX_VERCEL_RUNTIME='${FLOX_SANDBOX_VERCEL_RUNTIME}' is not a" >&2
        echo "      known Vercel Sandbox runtime (node22|node24|python3.13); the launch" >&2
        echo "      will reject it. Unset it to use the default (node24)." >&2
        ;;
    esac
  fi

  # Demo fixture: a planted "secret" the sandbox must never see (beat 3 of
  # demo/VERCEL-SANDBOX.md). On Vercel Sandbox the sandbox is remote and has no
  # view of the host filesystem at all, so this is unreachable by construction.
  # Removed by profile.deactivate.
  mkdir -p "$HOME/demo-secrets"
  printf 'API_KEY=sk-demo-FAKE-do-not-use\n' > "$HOME/demo-secrets/.env"
'''

# Presentation-shell setup, so the walkthrough's manual export block
# disappears. bash and zsh only — the demo script targets bash, and
# `alias`/`export` syntax is not portable to fish/tcsh.
[profile]
bash = '''
  if [ -n "${FLOX_BIN:-}" ]; then
    alias flox='$FLOX_BIN'
  fi
  export FLOX_VERSION="$("${FLOX_BIN:-flox}" --version)"
'''
zsh = '''
  if [ -n "${FLOX_BIN:-}" ]; then
    alias flox='$FLOX_BIN'
  fi
  export FLOX_VERSION="$("${FLOX_BIN:-flox}" --version)"
'''

[profile.deactivate]
common = '''
  # Deactivating the demo cleans up after itself: remove the planted secret.
  rm -rf "$HOME/demo-secrets"
'''

[options]
# Vercel Sandbox is reached over its API from any host; the setup env itself
# only needs to provide nodejs/npm (to install the CLI), so both dev systems
# are supported.
systems = ["aarch64-darwin", "x86_64-linux"]
